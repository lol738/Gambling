<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FDC - Friedrich-Dessauer-Casino</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link rel="stylesheet" href="/plinkoball/plinkoball.css">
    <link rel="stylesheet" href="/fdc-theme.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="/IP.js"></script>
  </head>
  <body>
    <div id="fdc-bg-glow"></div>
    <canvas id="fdc-particle-canvas"></canvas>
    <header>
      <div class="branding">
        <div class="brand-text">
                <div class="main-title" onclick="window.location.href='/main'">FD₵</div>
          <div class="sub-title">Friedrich-Dessauer-Casino</div>
        </div>
      </div>
      <button class="mute-toggle" onclick="toggleMute()" id="mute-btn">
        🔊 SOUND ON
      </button>
    </header>

    <main>
      <div id="game-container">
        <div id="ui-panel">
          <div class="stat-box">
            <div
              style="
                font-size: 10px;
                color: var(--text-dim);
                text-transform: uppercase;
              "
            >
              Balance
            </div>
            <div id="balance" class="value">0</div>
          </div>

          <div class="bet-controls">
            <input type="number" id="bet-input" value="100" />
            <div
              style="
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 5px;
                margin-top: 10px;
              "
            >
              <button
                onclick="setBet(10)"
                style="
                  background: #222;
                  color: #fff;
                  border: none;
                  padding: 8px;
                  cursor: pointer;
                "
              >
                $10
              </button>
              <button
                onclick="setBet(50)"
                style="
                  background: #222;
                  color: #fff;
                  border: none;
                  padding: 8px;
                  cursor: pointer;
                "
              >
                $50
              </button>
              <button
                onclick="setBet(100)"
                style="
                  background: #222;
                  color: #fff;
                  border: none;
                  padding: 8px;
                  cursor: pointer;
                "
              >
                $100
              </button>
            </div>
          </div>

          <button id="drop-btn">DROP BALL</button>
          <div id="history"></div>
        </div>

        <div id="canvas-wrapper">
          <div id="plinko-board"></div>
        </div>
      </div>
    </main>

    <script src="/fdc-theme.js"></script>
    <script src="/plinkoball/plinkoball.js"></script>
  </body>
</html>
